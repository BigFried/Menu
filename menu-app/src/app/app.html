<div class="menu-app">

  <!-- Header -->
  <header class="header">
    <img src="assets/logo.jpeg" alt="BIG" class="logo" />
  </header>

  <!-- Tab Navigation -->
  <nav class="tabs">
    <button
      *ngFor="let tab of tabs"
      class="tab-btn"
      [class.active]="activeTab === tab.id"
      (click)="setTab(tab.id)">
      <span class="tab-en">{{ tab.labelEn }}</span>
      <span class="tab-ar">{{ tab.labelAr }}</span>
    </button>
  </nav>

  <!-- Menu Image Pages -->
  <main class="menu-content">
    <div *ngIf="activeTab === 'fried'" class="menu-image-wrap">
      <img src="assets/menu1.jpeg" alt="Fried Chicken Meals" class="menu-image" />
    </div>
    <div *ngIf="activeTab !== 'fried'" class="menu-image-wrap">
      <img src="assets/menu2.jpeg" alt="Menu Page 2" class="menu-image" />
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>BIG — الأفضل دايماً</p>
  </footer>

</div>
